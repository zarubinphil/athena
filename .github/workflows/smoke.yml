name: smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    # macOS: dry-validate использует plutil/launchd-семантику (macOS-only)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # нужен для merge-base в email-check

      - name: shellcheck (lint)
        run: |
          brew install shellcheck
          shellcheck -S error bootstrap.sh smoke/*.sh

      - name: bootstrap --dry-run (оркестратор слоёв 0–6, без побочных эффектов)
        run: ./bootstrap.sh --dry-run

      - name: smoke (структура · чистота · личное · канон · self-learning · security-guard · dry-validate)
        run: bash smoke/smoke.sh

      - name: clean-room dry-validate (generic-only → GREEN, 0 неизвестных токенов)
        run: |
          export ATHENA_PRIVATE_DIR="$(mktemp -d)"   # нет overlay = чистый таргет
          bash smoke/dry-validate.sh
